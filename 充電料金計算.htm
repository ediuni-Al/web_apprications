<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ EV充電コスト計算機</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; padding: 20px; max-width: 500px; margin: auto; background-color: #f9f9f9; }
        h2 { text-align: center; color: #333; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
        input { width: 100%; padding: 12px; box-sizing: border-box; font-size: 18px; border: 2px solid #eee; border-radius: 10px; }
        .presets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        button { padding: 10px; border: none; background: #e0e0e0; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #007bff; color: white; }
        #result { text-align: center; font-size: 2em; font-weight: bold; color: #007bff; margin: 20px 0; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th { background: #007bff; color: white; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
    </style>
</head>
<body>

    <h2>⚡ EV充電コスト計算機</h2>
    
    <div class="card">
        <div class="input-group">
            <label>🔋 充電速度 (kW/hr)</label>
            <div class="presets" id="speedPresets"></div>
            <input type="number" id="speed" oninput="saveAndCalculate('speed')">
        </div>
        
        <div class="input-group">
            <label>💰 30分あたりの料金 (円)</label>
            <input type="number" id="pricePer30Min" oninput="syncAndCalculate('30min')">
        </div>

        <div class="input-group">
            <label>⏱️ 1分あたりの料金 (円)</label>
            <input type="number" id="pricePerMin" oninput="syncAndCalculate('1min')">
        </div>
    </div>

    <div id="result">-- 円/kW</div>

    <table>
        <thead><tr><th>時間</th><th>充電量</th><th>費用</th></tr></thead>
        <tbody id="tbody"></tbody>
    </table>

    <script>
        const speedInput = document.getElementById('speed');
        const price30Input = document.getElementById('pricePer30Min');
        const priceMinInput = document.getElementById('pricePerMin');

        window.onload = () => {
            speedInput.value = localStorage.getItem('speed') || 50;
            price30Input.value = localStorage.getItem('pricePer30Min') || 450;
            priceMinInput.value = (price30Input.value / 30).toFixed(2);
            createPresets();
            calculate();
        };

        function createPresets() {
            const container = document.getElementById('speedPresets');
            [30, 50, 90, 100, 150].forEach(val => {
                const btn = document.createElement('button');
                btn.innerText = val + 'kW';
                btn.onclick = () => { speedInput.value = val; saveAndCalculate(); };
                container.appendChild(btn);
            });
        }

        function syncAndCalculate(source) {
            if (source === '30min') {
                priceMinInput.value = (price30Input.value / 30).toFixed(2);
            } else {
                price30Input.value = (priceMinInput.value * 30).toFixed(0);
            }
            saveAndCalculate();
        }

        function saveAndCalculate() {
            localStorage.setItem('speed', speedInput.value);
            localStorage.setItem('pricePer30Min', price30Input.value);
            calculate();
        }

        function calculate() {
            const speed = parseFloat(speedInput.value);
            const pricePerMin = parseFloat(priceMinInput.value);
            if (isNaN(speed) || isNaN(pricePerMin) || speed === 0) return;

            const effectiveSpeed = (speed <= 100) ? (speed * 0.9) : 90;
            const yenPerKw = pricePerMin / (effectiveSpeed / 60);
            
            document.getElementById('result').innerText = `${yenPerKw.toFixed(1)} 円/kW`;

            const tbody = document.getElementById('tbody');
            tbody.innerHTML = '';
            [10, 15, 20, 30].forEach(min => {
                const kw = (effectiveSpeed / 60) * min;
                const cost = min * pricePerMin;
                tbody.innerHTML += `<tr><td>${min}分</td><td>${kw.toFixed(1)} kW</td><td>${Math.round(cost)} 円</td></tr>`;
            });
        }
    </script>
</body>
</html>
