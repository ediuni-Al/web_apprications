<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鹿児島市 使っチャレ予報</title>
<style>
  body {
    font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
    padding: 8px;
    background: #f0f4f8;
    margin: 0;
    color: #333;
  }
  h1 {
    font-size: 16px;
    text-align: center;
    color: #005a5a;
    margin: 8px 0;
    padding: 4px;
    background: #e0ecec;
    border-radius: 4px;
  }
  #forecast-container {
    max-width: 500px;
    margin: 0 auto;
  }
  .card {
    background: white;
    border-radius: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    margin-bottom: 6px;
    padding: 8px 12px;
    border-left: 5px solid #ccc;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .card.high { border-left-color: #ff5252; background: #fffefe; }
  .card.mid { border-left-color: #4db6ac; }
  .card.low { border-left-color: #90a4ae; }

  .top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .date-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .date {
    font-size: 14px;
    font-weight: bold;
    color: #444;
  }
  .weather-temp {
    font-size: 13px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .sun { color: #e65100; }
  .cloud { color: #546e7a; }
  .rain { color: #1e88e5; }

  .main-content {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .probability {
    font-size: 20px;
    font-weight: 900;
    min-width: 85px;
  }
  .prob-high { color: #d32f2f; }
  
  .short-reason {
    font-size: 11px;
    color: #666;
    flex: 1;
    text-align: right;
    line-height: 1.2;
  }

  #loading { text-align: center; padding: 40px; color: #666; font-size: 14px; }
</style>
</head>
<body>

<h1>[ 鹿児島市の使っチャレ予報(11:00-14:00) ]</h1>

<div id="forecast-container">
  <div id="loading">予報を解析中...</div>
</div>

<script>
const url = "https://api.open-meteo.com/v1/forecast?latitude=31.5602&longitude=130.5581&daily=weathercode,temperature_2m_max&timezone=Asia%2FTokyo&forecast_days=8";

async function updateForecast() {
  try {
    const response = await fetch(url);
    const data = await response.json();
    const daily = data.daily;
    const container = document.getElementById("forecast-container");
    container.innerHTML = "";

    for (let i = 1; i < daily.time.length; i++) {
      const dateObj = new Date(daily.time[i]);
      const temp = Math.round(daily.temperature_2m_max[i]);
      const code = daily.weathercode[i];

      let wsimple = "曇";
      let colorClass = "cloud";
      if (code <= 3) { wsimple = "晴"; colorClass = "sun"; }
      else if (code >= 51) { wsimple = "雨"; colorClass = "rain"; }

      let pct = (wsimple === "晴") ? 75 : (wsimple === "曇") ? 50 : 25;
      if (temp <= 24) pct += 10;
      if (temp >= 28) pct -= 10;
      
      const dayIndex = dateObj.getDay();
      const isHoliday = (dayIndex === 0 || dayIndex === 6);
      if (isHoliday) pct += 5;
      pct += 5; 
      pct = Math.min(95, Math.max(5, pct));

      let icon = (pct >= 70) ? "🔥" : (pct <= 30) ? "△" : "⚪️";
      let statusClass = (pct >= 70) ? "high" : (pct <= 30) ? "low" : "mid";
      let dayName = ["日","月","火","水","木","金","土"][dayIndex];

      const card = document.createElement("div");
      card.className = `card ${statusClass}`;
      card.innerHTML = `
        <div class="top-row">
          <div class="date-group">
            <span class="date">${dateObj.getMonth()+1}/${dateObj.getDate()}(${dayName})</span>
            <span class="weather-temp ${colorClass}">${wsimple} / ${temp}℃</span>
          </div>
          <div style="font-size: 10px; color: #aaa;">${isHoliday ? '休日' : '平日'}</div>
        </div>
        <div class="main-content">
          <div class="probability ${pct >= 70 ? 'prob-high' : ''}">${icon} ${pct}%</div>
          <div class="short-reason">
            ${wsimple === "晴" ? "余剰電力あり" : "発電低下"} / 
            ${temp <= 24 ? "冷房不要" : temp >= 28 ? "需要増" : "標準"}
          </div>
        </div>
      `;
      container.appendChild(card);
    }
  } catch (e) {
    document.getElementById("forecast-container").innerHTML = "<div id='loading'>データ取得エラー</div>";
  }
}
updateForecast();
</script>
</body>
</html>
