<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>鹿児島市 使っチャレ実施可能性（11〜14時）</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 12px; }
    h1 { font-size: 20px; margin-bottom: 8px; }
    table { border-collapse: collapse; width: 100%; margin-top: 8px; }
    th, td { border: 1px solid #ccc; padding: 6px; font-size: 13px; text-align: center; }
    th { background: #f0f0f0; }
    .small { font-size: 11px; color: #666; }
  </style>
</head>
<body>
  <h1>鹿児島市 使っチャレ実施可能性（11〜14時）</h1>
  <div class="small">※Open-Meteoの予報から自動計算（ローカルHTML）</div>
  <table id="result">
    <tr>
      <th>日付</th>
      <th>天気</th>
      <th>実施</th>
      <th>理由</th>
    </tr>
  </table>

  <script>
    // 鹿児島市付近（緯度経度）
    const url = "https://api.open-meteo.com/v1/forecast?latitude=31.6&longitude=130.55&daily=weathercode,temperature_2m_max&timezone=Asia/Tokyo";

    fetch(url)
      .then(r => r.json())
      .then(data => {
        const days = data.daily.time;
        const wcode = data.daily.weathercode;
        const tmax  = data.daily.temperature_2m_max;
        const table = document.getElementById("result");

        for (let i = 0; i < 7; i++) {
          const code = wcode[i];
          const temp = tmax[i];

          // weathercode → シンプルな天気表現
          let wtxt = "";
          if (code <= 3) wtxt = "晴れ";
          else if (code <= 45) wtxt = "曇り";
          else wtxt = "雨";

          // 使っチャレ実施％ロジック（ざっくり版）
          let pct = 0;
          if (wtxt === "晴れ") {
            pct = 80;
            if (temp <= 24) pct = 85;      // 冷房需要少 → さらに有利
            if (temp >= 28) pct = 70;      // 冷房入り始め → 少し下げる
          } else if (wtxt === "曇り") {
            pct = 50;
          } else if (wtxt === "雨") {
            pct = 20;
          }

          // アイコン
          let icon = "⚪️";
          if (pct >= 70) icon = "🔥";
          else if (pct <= 30) icon = "△";
          // 0%近いなら✖️にしてもよいが、ここでは△止まりにしておく

          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${days[i]}</td>
            <td>${wtxt}</td>
            <td>${icon} ${pct}%</td>
            <td>11〜14時は${wtxt}想定／最高気温 ${temp}℃</td>
          `;
          table.appendChild(tr);
        }
      })
      .catch(e => {
        const table = document.getElementById("result");
        const tr = document.createElement("tr");
        tr.innerHTML = `<td colspan="4">データ取得エラー：${e}</td>`;
        table.appendChild(tr);
      });
  </script>
</body>
</html>
