<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVのガソリン車燃費換算</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; }
        body { font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 20px; background: var(--bg); color: #333; }
        .card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: relative; }
        h1 { font-size: 1.25rem; color: var(--primary); text-align: center; margin-bottom: 20px; }
        
        .help-btn { position: absolute; top: 20px; right: 20px; width: 28px; height: 28px; border-radius: 50%; border: 1px solid #ccc; background: white; cursor: pointer; color: #666; font-weight: bold; }
        
        .input-group { margin-bottom: 18px; }
        .row { display: flex; gap: 10px; align-items: flex-end; }
        .flex-1 { flex: 1; }
        
        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 6px; color: #666; }
        input { width: 100%; padding: 12px; box-sizing: border-box; border: 2px solid #eee; border-radius: 8px; font-size: 1.1rem; }
        input:focus { border-color: var(--primary); outline: none; }
        
        .sync-label { font-size: 0.75rem; color: #1a73e8; margin-top: 4px; display: block; height: 1em; }
        
        .result { margin-top: 25px; padding: 20px; background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); border-radius: 12px; text-align: center; }
        .result-val { font-size: 2.4rem; font-weight: 800; color: var(--primary); }
        .unit { font-size: 1.1rem; margin-left: 4px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; }
        .modal-content { background: white; margin: 15% auto; padding: 25px; width: 85%; max-width: 400px; border-radius: 12px; line-height: 1.6; }
        .close-btn { display: block; width: 100%; padding: 10px; margin-top: 20px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card">
    <button class="help-btn" onclick="toggleHelp(true)">?</button>
    <h1>[ EVのガソリン車燃費換算 ]</h1>
    
    <div class="input-group">
        <div class="row">
            <div class="flex-1">
                <label>電費 (km/kWh)</label>
                <input type="number" id="kmPerKwh" step="0.1" placeholder="6.0">
            </div>
            <div class="flex-1">
                <label>電費 (Wh/km)</label>
                <input type="number" id="whPerKm" step="1" placeholder="167">
            </div>
        </div>
        <span class="sync-label" id="syncMsg"></span>
    </div>

    <div class="input-group">
        <label>レギュラーガソリン価格 (円/L)</label>
        <input type="number" id="gasPrice" placeholder="170">
    </div>

    <div class="input-group">
        <label>充電電気代単価 (円/kWh)</label>
        <input type="number" id="elecPrice" placeholder="14.59">
    </div>

    <div class="result">
        <div style="font-size: 0.9rem;">ガソリン車換算での燃費</div>
        <div class="result-val"><span id="equivalentFuel">--</span><span class="unit">km/L</span></div>
    </div>
</div>

<div id="helpModal" class="modal">
    <div class="modal-content">
        <h2>使いかたとヒント</h2>
        <ul>
            <li><strong>km/kWh:</strong> 1kWhで何km走れるか。</li>
            <li><strong>Wh/km:</strong> 1km走るのに何Wh必要か（逆数）。</li>
            <li><strong>計算式:</strong> (km/kWh × ガソリン単価) ÷ 電気代</li>
        </ul>
        <button class="close-btn" onclick="toggleHelp(false)">閉じる</button>
    </div>
</div>

<script>
const STORAGE_KEY = 'ev_calc_settings_v3';
const el = {
    kmPerKwh: document.getElementById('kmPerKwh'),
    whPerKm: document.getElementById('whPerKm'),
    gasPrice: document.getElementById('gasPrice'),
    elecPrice: document.getElementById('elecPrice'),
    result: document.getElementById('equivalentFuel')
};

function toggleHelp(show) {
    document.getElementById('helpModal').style.display = show ? 'block' : 'none';
}

function calculate(source) {
    let kmKwh = parseFloat(el.kmPerKwh.value) || 0;
    let whKm = parseFloat(el.whPerKm.value) || 0;
    const gasP = parseFloat(el.gasPrice.value) || 0;
    const elecP = parseFloat(el.elecPrice.value) || 0;

    // 相互換算のロジック
    if (source === 'kmPerKwh' && kmKwh > 0) {
        whKm = Math.round(1000 / kmKwh);
        el.whPerKm.value = whKm;
    } else if (source === 'whPerKm' && whKm > 0) {
        kmKwh = parseFloat((1000 / whKm).toFixed(2));
        el.kmPerKwh.value = kmKwh;
    }

    // ガソリン燃費換算の計算
    if (kmKwh > 0 && gasP > 0 && elecP > 0) {
        const res = (kmKwh * gasP) / elecP;
        el.result.innerText = res.toFixed(1);
    } else {
        el.result.innerText = "--";
    }
    saveSettings();
}

function saveSettings() {
    const data = {
        kmPerKwh: el.kmPerKwh.value,
        whPerKm: el.whPerKm.value,
        gasPrice: el.gasPrice.value,
        elecPrice: el.elecPrice.value
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadSettings() {
    const saved = localStorage.getItem(STORAGE_KEY);
    const data = saved ? JSON.parse(saved) : { kmPerKwh: 6.0, whPerKm: 167, gasPrice: 150, elecPrice: 14.59 };
    Object.keys(data).forEach(key => { if(el[key]) el[key].value = data[key]; });
    calculate();
}

el.kmPerKwh.addEventListener('input', () => calculate('kmPerKwh'));
el.whPerKm.addEventListener('input', () => calculate('whPerKm'));
el.gasPrice.addEventListener('input', () => calculate());
el.elecPrice.addEventListener('input', () => calculate());

window.onload = loadSettings;
window.onclick = (e) => { if(e.target.className === 'modal') toggleHelp(false); };
</script>

</body>
</html>
