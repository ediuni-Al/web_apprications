<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Efficiency Tracker ver1.2</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📈️</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --primary: #1a73e8; --bg: #f8f9fa; --card-bg: #ffffff;
            --text: #333333; --text-sub: #666666; --input-border: #eeeeee;
            --result-bg: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
        }
        [data-theme="dark"] {
            --bg: #121212; --card-bg: #1e1e1e; --text: #e0e0e0;
            --text-sub: #aaaaaa; --input-border: #333333;
            --result-bg: linear-gradient(135deg, #0d47a1 0%, #1565c0 100%);
        }
        body { font-family: sans-serif; max-width: 550px; margin: 0 auto; padding: 20px; background: var(--bg); color: var(--text); transition: 0.3s; }
        .header-controls { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 15px; }
        .icon-btn { background: var(--card-bg); border: 1px solid var(--input-border); border-radius: 8px; padding: 8px 12px; cursor: pointer; color: var(--text); font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { font-size: 1.2rem; color: var(--primary); text-align: center; margin-bottom: 25px; margin-top: 0; }
        .input-group { margin-bottom: 18px; }
        .row { display: flex; gap: 10px; align-items: flex-end; }
        .flex-1 { flex: 1; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 6px; color: var(--text-sub); }
        input { width: 100%; padding: 12px; box-sizing: border-box; border: 2px solid var(--input-border); border-radius: 8px; font-size: 1.1rem; background: var(--card-bg); color: var(--text); }
        .result { margin-top: 25px; padding: 20px; background: var(--result-bg); border-radius: 12px; text-align: center; color: #000; position: relative; }
        [data-theme="dark"] .result { color: #fff; }
        .result-val { font-size: 2.4rem; font-weight: 800; color: var(--primary); }
        [data-theme="dark"] .result-val { color: #90caf9; }
        .cost-val { font-size: 1.2rem; margin-top: 8px; font-weight: bold; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 8px; }
        [data-theme="dark"] .cost-val { border-top-color: rgba(255,255,255,0.1); }
        .sub-result { font-size: 1rem; margin-top: 5px; opacity: 0.8; font-weight: bold; }
        .save-btn { width: 100%; padding: 12px; margin-top: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .chart-container { margin-top: 20px; height: 220px; }
        .history-table { width: 100%; margin-top: 10px; border-collapse: collapse; font-size: 0.85rem; }
        .history-table th, .history-table td { padding: 10px; border-bottom: 1px solid var(--input-border); text-align: center; }
        .del-btn { color: #ff5252; cursor: pointer; background: none; border: none; font-size: 1.2rem; }
        .show-more-area { text-align: center; margin-top: 15px; }
        .text-btn { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 0.9rem; font-weight: bold; text-decoration: underline; margin: 5px; }
        .text-btn.danger { color: #ff5252; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 100; }
        .modal-content { background: var(--card-bg); margin: 15% auto; padding: 25px; width: 85%; max-width: 400px; border-radius: 12px; }
        #importFile { display: none; }
    </style>
</head>
<body>

<div class="header-controls">
    <button class="icon-btn" onclick="toggleHelp(true)">?</button>
    <button class="icon-btn" onclick="toggleLang()" id="langBtn">EN</button>
    <button class="icon-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
</div>

<div class="card">
    <h1 id="t-title">[ EVの電費管理 ]</h1>
    <div class="input-group">
        <div class="row">
            <div class="flex-1">
                <label id="t-label-kwh">電費 (km/kWh)</label>
                <input type="number" id="kmPerKwh" step="0.1" inputmode="decimal" placeholder="例: 6.0">
            </div>
            <div class="flex-1">
                <label id="t-label-kwh100">電費 (kWh/100km)</label>
                <input type="number" id="kwh100km" step="0.1" inputmode="decimal" placeholder="例: 16.7">
            </div>
        </div>
    </div>
    <div class="row">
        <div class="input-group flex-1">
            <label id="t-label-gas">ガソリン価格 (¥/L)</label>
            <input type="number" id="gasPrice" inputmode="decimal" placeholder="例: 170">
        </div>
        <div class="input-group flex-1">
            <label id="t-label-elec">電気代 (¥/kWh)</label>
            <input type="number" id="elecPrice" inputmode="decimal" placeholder="例: 25.0">
        </div>
    </div>

    <div class="result">
        <div id="t-result-label" style="font-size: 0.8rem;">ガソリン車換算での燃費換算</div>
        <div class="result-val"><span id="equivalentFuel">--</span><span class="unit">km/L</span></div>
        <div id="costPerKm" class="cost-val">-- <span style="font-size:0.9rem">円/km</span></div>
        <div id="mileageResult" class="sub-result"></div>
    </div>
    <button class="save-btn" onclick="saveToHistory()" id="t-save">データを履歴に保存</button>
</div>

<div class="card">
    <h2 id="t-chart-title" style="font-size: 1rem; margin-top:0;">電費推移グラフ (km/kWh)</h2>
    <div class="chart-container">
        <canvas id="efficiencyChart"></canvas>
    </div>
    <table class="history-table">
        <thead>
            <tr><th id="t-h-date">日付</th><th id="t-h-eff">電費</th><th></th></tr>
        </thead>
        <tbody id="historyBody"></tbody>
    </table>
    
    <div class="show-more-area">
        <div id="moreArea" style="display:none;">
            <button class="text-btn" id="t-more" onclick="toggleShowAll()">以前の履歴を表示</button>
        </div>
        <div style="margin-top:10px; border-top: 1px solid var(--input-border); padding-top:10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px;">
            <button class="text-btn" id="t-export" onclick="exportData()">データを書き出す</button>
            <button class="text-btn" id="t-import" onclick="document.getElementById('importFile').click()">インポート</button>
            <button class="text-btn danger" id="t-clear" onclick="clearAllData()">全消去</button>
            <input type="file" id="importFile" accept=".json" onchange="importData(event)">
        </div>
    </div>
</div>

<div id="helpModal" class="modal">
    <div class="modal-content">
        <h2 id="t-help-title">使い方</h2>
        <ul id="t-help-list"></ul>
        <button class="icon-btn" style="width:100%" onclick="toggleHelp(false)" id="t-close">閉じる</button>
    </div>
</div>

<script>
const STORAGE_KEY = 'ev_calc_v12';
const i18n = {
    ja: {
        title: "[ EVの電費管理 ]", kwh: "電費 (km/kWh)", kwh100: "電費 (kWh/100km)",
        gas: "ガソリン価格 (¥/L)", elec: "電気代 (¥/kWh)", res: "ガソリン車換算での燃費",
        save: "データを履歴に保存", chart: "電費推移グラフ (km/kWh)", hDate: "日付", hEff: "電費",
        close: "閉じる", helpT: "使い方", helpL: ["計算結果を保存してグラフで確認できます","機種変更時は下部の書き出し/インポートをご利用ください"], 
        ph: "例: ", more: "以前の履歴を表示", less: "履歴をたたむ",
        export: "データを書き出す", import: "インポート", clear: "全消去",
        importConfirm: "現在の設定と履歴がすべて上書きされます。よろしいですか？",
        importSuccess: "データをインポートしました。",
        importError: "ファイル形式が正しくありません。",
        clearConfirm: "保存された履歴と設定をすべて消去します。よろしいですか？",
        clearSuccess: "すべてのデータを消去しました。",
        unitCost: "円/km"
    },
    en: {
        title: "[ EV to Gas MPG Equivalent ]", kwh: "Eff (km/kWh)", kwh100: "Eff (kWh/100km)",
        gas: "Gas (¥/L)", elec: "Elec (¥/kWh)", res: "Equivalent Economy",
        save: "Save to History", chart: "EV Efficiency Trend (km/kWh)", hDate: "Date", hEff: "Efficiency",
        close: "Close", helpT: "Usage", helpL: ["Save results to track trends","Use Export/Import for device migration"], 
        ph: "e.g. ", more: "Show older history", less: "Show less",
        export: "Export", import: "Import", clear: "Clear All",
        importConfirm: "Current settings and history will be overwritten. Continue?",
        importSuccess: "Data imported successfully.",
        importError: "Invalid file format.",
        clearConfirm: "All history and settings will be deleted. Are you sure?",
        clearSuccess: "All data cleared.",
        unitCost: "¥/km"
    }
};

let currentLang = 'ja';
let historyData = [];
let chart;
let showAll = false;

const el = {
    kmPerKwh: document.getElementById('kmPerKwh'), kwh100km: document.getElementById('kwh100km'),
    gasPrice: document.getElementById('gasPrice'), elecPrice: document.getElementById('elecPrice'),
    result: document.getElementById('equivalentFuel'), 
    cost: document.getElementById('costPerKm'),
    mileage: document.getElementById('mileageResult')
};

function initChart() {
    const ctx = document.getElementById('efficiencyChart').getContext('2d');
    chart = new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'km/kWh', data: [], borderColor: '#34a853', tension: 0.3, fill: true, backgroundColor: 'rgba(52, 168, 83, 0.1)' }] },
        options: { responsive: true, maintainAspectRatio: false }
    });
}

function updateUI() {
    const t = i18n[currentLang];
    document.getElementById('t-title').innerText = t.title;
    document.getElementById('t-label-kwh').innerText = t.kwh;
    document.getElementById('t-label-kwh100').innerText = t.kwh100;
    document.getElementById('t-label-gas').innerText = t.gas;
    document.getElementById('t-label-elec').innerText = t.elec;
    document.getElementById('t-result-label').innerText = t.res;
    document.getElementById('t-save').innerText = t.save;
    document.getElementById('t-chart-title').innerText = t.chart;
    document.getElementById('t-h-date').innerText = t.hDate;
    document.getElementById('t-h-eff').innerText = t.hEff;
    document.getElementById('t-close').innerText = t.close;
    document.getElementById('t-help-title').innerText = t.helpT;
    document.getElementById('t-more').innerText = showAll ? t.less : t.more;
    document.getElementById('t-export').innerText = t.export;
    document.getElementById('t-import').innerText = t.import;
    document.getElementById('t-clear').innerText = t.clear;
    document.getElementById('langBtn').innerText = currentLang === 'ja' ? 'EN' : 'JP';
    document.getElementById('t-help-list').innerHTML = t.helpL.map(txt => `<li>${txt}</li>`).join('');
    
    el.kmPerKwh.placeholder = t.ph + "6.0";
    el.kwh100km.placeholder = t.ph + "16.7";
    el.gasPrice.placeholder = t.ph + "170";
    el.elecPrice.placeholder = t.ph + "25.0";

    calculate();
    renderHistory();
}

function calculate(source) {
    let kmKwh = parseFloat(el.kmPerKwh.value);
    let kwh100 = parseFloat(el.kwh100km.value);

    if (source === 'kmPerKwh' && !isNaN(kmKwh) && kmKwh > 0) { 
        // km/kWh -> kWh/100km (100 / km/kWh)
        el.kwh100km.value = (100 / kmKwh).toFixed(1); 
    } 
    else if (source === 'kwh100km' && !isNaN(kwh100) && kwh100 > 0) { 
        // kWh/100km -> km/kWh (100 / kWh/100km)
        el.kmPerKwh.value = (100 / kwh100).toFixed(1); 
    }

    const gasP = parseFloat(el.gasPrice.value);
    const elecP = parseFloat(el.elecPrice.value);
    const currentKmKwh = parseFloat(el.kmPerKwh.value);

    if (currentKmKwh > 0 && elecP > 0) {
        const costVal = elecP / currentKmKwh;
        el.cost.innerHTML = `${costVal.toFixed(1)} <span style="font-size:0.9rem">${i18n[currentLang].unitCost}</span>`;

        if (gasP > 0) {
            const kmL = (currentKmKwh * gasP) / elecP;
            el.result.innerText = kmL.toFixed(1);
            if (currentLang === 'en') { 
                el.mileage.innerText = `≈ ${(kmL * 2.352).toFixed(1)} mpg`; 
                el.mileage.style.display = 'block'; 
            }
            else { el.mileage.style.display = 'none'; }
        } else {
            el.result.innerText = "--";
        }
    } else { 
        el.result.innerText = "--"; 
        el.cost.innerText = "-- " + i18n[currentLang].unitCost;
        el.mileage.style.display = 'none'; 
    }
    saveToLocal();
}

function saveToHistory() {
    const rawEff = parseFloat(el.kmPerKwh.value);
    if (isNaN(rawEff) || rawEff <= 0) return;
    historyData.push({ id: Date.now(), date: new Date().toLocaleDateString(), val: rawEff });
    renderHistory();
    saveToLocal();
}

function deleteHistory(id) {
    historyData = historyData.filter(item => item.id !== id);
    renderHistory();
    saveToLocal();
}

function clearAllData() {
    if (!confirm(i18n[currentLang].clearConfirm)) return;
    localStorage.removeItem(STORAGE_KEY);
    historyData = [];
    el.kmPerKwh.value = "";
    el.kwh100km.value = "";
    el.gasPrice.value = "";
    el.elecPrice.value = "";
    renderHistory();
    calculate();
    alert(i18n[currentLang].clearSuccess);
}

function toggleShowAll() { showAll = !showAll; updateUI(); }

function renderHistory() {
    const body = document.getElementById('historyBody');
    body.innerHTML = '';
    const sortedData = [...historyData].sort((a, b) => b.id - a.id);
    const displayData = showAll ? sortedData : sortedData.slice(0, 10);
    displayData.forEach(item => {
        const row = `<tr><td>${item.date}</td><td>${item.val} km/kWh</td><td><button class="del-btn" onclick="deleteHistory(${item.id})">×</button></td></tr>`;
        body.insertAdjacentHTML('beforeend', row);
    });
    document.getElementById('moreArea').style.display = historyData.length > 10 ? 'block' : 'none';
    if (chart) {
        chart.data.labels = historyData.map(d => d.date);
        chart.data.datasets[0].data = historyData.map(d => d.val);
        chart.update();
    }
}

function exportData() {
    const storageData = localStorage.getItem(STORAGE_KEY);
    if (!storageData) return;
    const data = JSON.stringify({ storage: JSON.parse(storageData) }, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const dateStr = new Date().toISOString().slice(0,10);
    a.download = `EV_data_${dateStr}.json`;
    a.click();
}

function importData(event) {
    const t = i18n[currentLang];
    const file = event.target.files[0];
    if (!file) return;
    if (!confirm(t.importConfirm)) { event.target.value = ""; return; }
    
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const imported = JSON.parse(e.target.result);
            if (imported.storage) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(imported.storage));
                loadSettings();
                alert(t.importSuccess);
            } else { throw new Error(); }
        } catch (err) { alert(t.importError); }
    };
    reader.readAsText(file);
    event.target.value = ""; 
}

function toggleLang() { currentLang = currentLang === 'ja' ? 'en' : 'ja'; updateUI(); }

function toggleTheme() {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', newTheme);
    document.getElementById('themeBtn').innerText = newTheme === 'dark' ? '☀️' : '🌙';
    saveToLocal();
}

function saveToLocal() {
    const data = {
        kmKwh: el.kmPerKwh.value, kwh100km: el.kwh100km.value, gasP: el.gasPrice.value, elecP: el.elecPrice.value,
        lang: currentLang, theme: document.documentElement.getAttribute('data-theme'), history: historyData
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadSettings() {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (saved) {
        el.kmPerKwh.value = saved.kmKwh || "";
        el.kwh100km.value = saved.kwh100km || "";
        el.gasPrice.value = saved.gasP || "";
        el.elecPrice.value = saved.elecP || "";
        currentLang = saved.lang || 'ja';
        historyData = saved.history || [];
        const theme = saved.theme || 'light';
        document.documentElement.setAttribute('data-theme', theme);
        document.getElementById('themeBtn').innerText = theme === 'dark' ? '☀️' : '🌙';
    }
    if (!chart) initChart();
    updateUI();
}

function toggleHelp(show) { document.getElementById('helpModal').style.display = show ? 'block' : 'none'; }

Object.values(el).forEach(input => {
    if(input && input.nodeName === 'INPUT') input.addEventListener('input', (e) => calculate(e.target.id));
});
window.onload = loadSettings;
</script>
</body>
</html>
